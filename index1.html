<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Panda ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

overflow-x:hidden;
background:linear-gradient(180deg,#ffd6e7,#fff0f5,#ffffff);

}

section{

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;

}

h1{

font-size:3rem;
color:#ff3d81;
font-family:Pacifico;
text-align:center;

}

h2{

color:#ff4d88;
font-size:1.3rem;
margin-top:15px;

}

button{

padding:18px 40px;
border:none;
border-radius:40px;
background:#ff4d88;
color:white;
font-size:20px;
margin-top:40px;
cursor:pointer;
box-shadow:0 10px 30px rgba(255,0,120,.25);

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

.heart{

position:fixed;
bottom:-50px;
font-size:25px;
animation:float 8s linear infinite;

}

@keyframes float{

0%{

transform:translateY(0) rotate(0);

opacity:1;

}

100%{

transform:translateY(-120vh) rotate(360deg);

opacity:0;

}

}

.sparkle{

position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;

}

@keyframes twinkle{

50%{

opacity:.2;
transform:scale(2);

}

}

#gift{

font-size:120px;
cursor:pointer;
transition:.5s;

}

#gift:hover{

transform:rotate(-8deg) scale(1.1);

}

.hidden{

display:none;

}

#main{

background:linear-gradient(180deg,#ffe2ef,#ffffff);

}

#title{

opacity:0;
transform:translateY(80px);

transition:1.2s;

}

.show{

opacity:1!important;
transform:translateY(0)!important;

}

.panda{

width:220px;
animation:bounce 2s infinite;

}

@keyframes bounce{

50%{

transform:translateY(-18px);

}

}

</style>

</head>

<body>

<section id="welcome">

<div id="gift">🎁</div>

<h2>Tap the Gift</h2>

</section>

<section id="main" class="hidden">

<h1 id="title">

Happy Birthday

<br>

Deepanshi 🐼

</h1>

<h2>

My Panda ❤️

</h2>

<img
class="panda"
src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png">

<button id="next">

Continue Surprise →

</button>

</section>

<script>

for(let i=0;i<35;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML=Math.random()>0.5?"💖":"🤍";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=20+Math.random()*20+"px";

h.style.animationDuration=5+Math.random()*6+"s";

document.body.appendChild(h);

}

for(let i=0;i<80;i++){

let s=document.createElement("div");

s.className="sparkle";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(s);

}

gift.onclick=()=>{

gift.style.transform="scale(12) rotate(720deg)";

gift.style.opacity=0;

setTimeout(()=>{

welcome.classList.add("hidden");

main.classList.remove("hidden");

setTimeout(()=>{

title.classList.add("show");

},400);

},700);

}

  /* ===========================
PART 2
===========================*/

// Create hidden letter section

const letter=document.createElement("section");

letter.id="letter";

letter.className="hidden";

letter.innerHTML=`

<h1 style="font-size:2.5rem">
A Letter For You 💌
</h1>

<div id="paper">

<p id="typing"> A very beautiful happy birthday my panda , Madam jii , My naagin may your day go with full of happiness and enjoyment not only this day but your life be filled  only with happyness may all the things you wish for became true,even the smallest ones of your wishes comes true ,may god give all my happiness to you and worries to me , Make you much more strong and brave , and i am glad that you came in my life i dont know what i meant to you but i am happy to you came in my life my panda so plese never be sad and be happy for your whole life as one day is not enough to know how special your my baby girl</p></p>

</div>

<button id="galleryBtn">

See Memories 📸

</button>

`;

document.body.appendChild(letter);


// Create gallery section

const gallery=document.createElement("section");

gallery.id="gallery";

gallery.className="hidden";

gallery.innerHTML=`

<h1>Our Memories 🐼</h1>

<div class="photos">

  <img src="IMG_20260719_171823.jpg" alt="Memory 1">

  <img src="IMG_20260719_171843.jpg" alt="Memory 2">

  <img src="IMG_20260719_171901.jpg" alt="Memory 3">

  <img src="IMG_20260719_172009.jpg" alt="Memory 4">

  <img src="IMG_20260719_200225.jpg" alt="Memory 5">

  <img src="IMG_20260719_200241.jpg" alt="Memory 6">

</div>

<button id="cakeBtn">

One More Surprise 🎂

</button>

`;

document.body.appendChild(gallery);


// Extra CSS

const style=document.createElement("style");

style.innerHTML=`

#paper{

width:90%;
max-width:700px;

background:white;

padding:30px;

border-radius:25px;

box-shadow:0 20px 50px rgba(0,0,0,.12);

margin-top:30px;

font-size:18px;

line-height:1.8;

color:#444;

min-height:220px;

}

.photos{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

padding:25px;

width:95%;

max-width:700px;

}

.photos img{

width:100%;

border-radius:20px;

aspect-ratio:1;

object-fit:cover;

transition:.4s;

box-shadow:0 10px 30px rgba(255,0,120,.2);

}

.photos img:hover{

transform:scale(1.08);

}

`;

document.head.appendChild(style);


// Continue button

next.onclick=()=>{

main.classList.add("hidden");

letter.classList.remove("hidden");

const msg=

`YOUR MESSAGE WILL COME HERE.

Replace this text with your own birthday message.

Happy Sweet 16, Panda 🐼❤️`;

let i=0;

function type(){

if(i<msg.length){

typing.innerHTML+=msg.charAt(i);

i++;

setTimeout(type,35);

}

}

type();

};


// Gallery button

document.addEventListener("click",e=>{

if(e.target.id=="galleryBtn"){

letter.classList.add("hidden");

gallery.classList.remove("hidden");

}

});
  /* ===========================
PART 3
Birthday Cake + Fireworks
===========================*/

// Create Cake Page

const cake=document.createElement("section");

cake.id="cake";

cake.className="hidden";

cake.innerHTML=`

<h1>Make A Birthday Wish 🎂</h1>

<div id="cakeBox">

🎂

</div>

<p style="font-size:20px;color:#ff4d88;margin-top:20px;">
Tap the Cake
</p>

</section>

<section id="final" class="hidden">

<h1>Happy 16th Birthday ❤️</h1>

<h2>Deepanshi 🐼</h2>

<div style="font-size:130px;">🐼🎁🧸</div>

<p style="
width:90%;
max-width:650px;
font-size:22px;
text-align:center;
color:#666;
margin-top:30px;
">

May your day be filled with happiness,
laughter,
cute pandas,
lots of cake,
and unforgettable memories.

</p>

<button onclick="location.reload()">

Replay Surprise ❤️

</button>

</section>

`;

document.body.appendChild(cake);


// Cake button

document.addEventListener("click",(e)=>{

if(e.target.id=="cakeBtn"){

gallery.classList.add("hidden");

cake.classList.remove("hidden");

}

});


// Extra CSS

const style2=document.createElement("style");

style2.innerHTML=`

#cakeBox{

font-size:170px;

cursor:pointer;

transition:.5s;

animation:bounce 2s infinite;

}

.fire{

position:fixed;

font-size:35px;

pointer-events:none;

animation:boom 1.2s linear forwards;

}

@keyframes boom{

0%{

transform:scale(.2);

opacity:1;

}

100%{

transform:translateY(-250px) scale(2);

opacity:0;

}

}

`;

document.head.appendChild(style2);


// Fireworks

function fireworks(){

for(let i=0;i<60;i++){

let f=document.createElement("div");

f.className="fire";

f.innerHTML=["🎆","✨","💖","🎉","🌸"][Math.floor(Math.random()*5)];

f.style.left=Math.random()*100+"vw";

f.style.top=Math.random()*100+"vh";

document.body.appendChild(f);

setTimeout(()=>{

f.remove();

},1200);

}

}


// Cake Tap

document.addEventListener("click",(e)=>{

if(e.target.id=="cakeBox"){

cakeBox.style.transform="scale(1.25) rotate(15deg)";

fireworks();

setTimeout(()=>{

cake.classList.add("hidden");

final.classList.remove("hidden");

fireworks();

setTimeout(fireworks,900);

setTimeout(fireworks,1800);

},1400);

}

});
  /* ===========================
PART 4 - FINAL
===========================*/

// Floating balloons

for(let i=0;i<15;i++){

let b=document.createElement("div");

b.innerHTML=["🎈","🎀","💖","🌸"][Math.floor(Math.random()*4)];

b.style.position="fixed";

b.style.left=Math.random()*100+"vw";

b.style.bottom="-60px";

b.style.fontSize=(30+Math.random()*30)+"px";

b.style.animation="balloon "+(8+Math.random()*6)+"s linear infinite";

b.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(b);

}

// CSS

const style3=document.createElement("style");

style3.innerHTML=`

@keyframes balloon{

0%{

transform:translateY(0);

opacity:0;

}

10%{

opacity:1;

}

100%{

transform:translateY(-120vh);

opacity:0;

}

}

.confetti{

position:fixed;

top:-20px;

font-size:22px;

pointer-events:none;

animation:fall 4s linear forwards;

}

@keyframes fall{

100%{

transform:translateY(120vh) rotate(720deg);

}

}

`;

document.head.appendChild(style3);


// Confetti

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.className="confetti";

c.innerHTML=["🎉","✨","💖","🌸","🎊"][Math.floor(Math.random()*5)];

c.style.left=Math.random()*100+"vw";

c.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(c);

setTimeout(()=>{

c.remove();

},5000);

}

}


// Hearts on touch

document.addEventListener("click",function(e){

let h=document.createElement("div");

h.innerHTML="💖";

h.style.position="fixed";

h.style.left=e.clientX+"px";

h.style.top=e.clientY+"px";

h.style.fontSize="35px";

h.style.pointerEvents="none";

h.style.transition="1s";

document.body.appendChild(h);

setTimeout(()=>{

h.style.transform="translateY(-120px) scale(2)";

h.style.opacity=0;

},50);

setTimeout(()=>{

h.remove();

},1000);

});


// Final celebration

setInterval(()=>{

if(!final.classList.contains("hidden")){

confetti();

fireworks();

}

},5000);
</script>
